version: '3'

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: "Compile the Fortress Governance Engine"
    cmds:
      - cargo build --release

  verify:
    desc: "Zero-Warning Gatekeeper: Format, Clippy, and Tests"
    cmds:
      - cargo fmt --all --check
      - cargo clippy -- -D warnings
      - cargo test

  clean:
    desc: "Purge compilation artifacts"
    cmds:
      - cargo clean
