name: "Continuous Integrity"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: "Deterministic Verification (Failover Mode)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (Official Failover)
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          # Disabling installer-side optimizations to ensure core-connectivity
          install_url: https://releases.nixos.org/nix/nix-2.20.5/install

      - name: Execute NIST Compliance Audit
        run: nix develop --command task verify
